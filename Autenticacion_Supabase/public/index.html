<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <div class="container">
        <div class="tabs">
            <button id="iniciar-sesion" class="tab active" data-tab="login">Iniciar Sesión</button>
            <button id="registrarse" class="tab" data-tab="signup">Registrarse</button>
        </div>

        <!-- Login -->
        <div id="login" class="tab-content">
            <h1>Iniciar Sesión</h1>
            <p>Ingresa tus credenciales para continuar</p>
            <form id="login-form">
                <input id="login-correo" type="email" name="email" placeholder="Correo electrónico" required />
                <input id="login-contrasena" type="password" name="password" placeholder="Contraseña" required />
                <p class="error" id="login-error">Correo o contraseña incorrectos.</p>
                <button type="submit">Entrar</button>
            </form>
        </div>

        <!-- Signup -->
        <div id="singup" class="tab-content hidden">
            <h1>Crear Cuenta</h1>
            <p>Completa el formulario para registrarte</p>
            <form id="singup-form">
                <input id="singup-correo" type="email" name="email" placeholder="Correo electrónico" required />
                <input id="singup-contrasena" type="password" name="password" placeholder="Contraseña" required />
                <p class="error" id="signup-error">Hubo un error al registrarse.</p>
                <button type="submit">Registrarse</button>
            </form>
        </div>
    </div>

    <script src="js/index.js"></script>
</body>
</html>
